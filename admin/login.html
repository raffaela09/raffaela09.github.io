<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin Topo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
    <link rel="stylesheet" href="style.css"> <style>
        /* Um CSS rapidinho só pra centralizar a caixa de login na tela */
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a1c; margin: 0; }
        .login-box { background-color: #2a2a2d; padding: 40px; border-radius: 12px; width: 100%; max-width: 350px; text-align: center; border: 1px solid var(--border-color); }
        .login-box h2 { color: #fff; margin-bottom: 20px; }
        .erro { color: #ff4a4a; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acesso Restrito</h2>
        <form id="form-login">
            <div class="input-group full-width">
                <input type="email" id="email" placeholder="Seu e-mail" required style="margin-bottom: 15px;">
            </div>
            <div class="input-group full-width">
                <input type="password" id="senha" placeholder="Sua senha" required style="margin-bottom: 20px;">
            </div>
            <button type="submit" class="btn-primary full-width">Entrar</button>
            <p class="erro" id="msg-erro">E-mail ou senha incorretos!</p>
        </form>
    </div>
    <script src="login.js" type="module"></script>
</body>
</html>
